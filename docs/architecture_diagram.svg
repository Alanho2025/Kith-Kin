<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <linearGradient id="header-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="800" fill="#fafafa" rx="12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1000" height="48" fill="url(#header-grad)" rx="12"/>
  <rect x="0" y="24" width="1000" height="24" fill="url(#header-grad)"/>
  <text x="500" y="30" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">Kith&amp;Kin Architecture — Sequential Agent Chain</text>

  <!-- ===== LAYER 1: USER ===== -->
  <rect x="350" y="65" width="300" height="55" rx="10" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="500" y="88" text-anchor="middle" fill="#0369a1" font-size="14" font-weight="600">Parents + Pharmacist</text>
  <text x="500" y="105" text-anchor="middle" fill="#64748b" font-size="11">Microphone · Speaker · Touch Screen</text>

  <!-- Arrow: User → Live API -->
  <line x1="500" y1="120" x2="500" y2="155" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== LAYER 2: LIVE API ===== -->
  <rect x="280" y="160" width="440" height="55" rx="10" fill="#fafafa" stroke="#888" stroke-width="2"/>
  <rect x="280" y="160" width="440" height="24" rx="10" fill="#e2e8f0"/>
  <rect x="280" y="175" width="440" height="9" fill="#e2e8f0"/>
  <text x="500" y="176" text-anchor="middle" fill="#475569" font-size="12" font-weight="600">Gemini Live API — Single WebSocket Session</text>
  <text x="500" y="198" text-anchor="middle" fill="#64748b" font-size="11">Audio Stream · Function Calls · JSON response · input_transcription</text>

  <!-- Three arrows from Live API -->
  <line x1="220" y1="215" x2="160" y2="280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="500" y1="215" x2="500" y2="280" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="780" y1="215" x2="840" y2="280" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow labels -->
  <text x="170" y="245" text-anchor="middle" fill="#16a34a" font-size="10">input_transcription</text>
  <text x="500" y="245" text-anchor="middle" fill="#2563eb" font-size="10">Audio + Function calls</text>
  <text x="820" y="245" text-anchor="middle" fill="#555" font-size="10">Tool requests</text>

  <!-- ===== CHANNEL 1: VISUAL TRACK (left) ===== -->
  <rect x="50" y="285" width="220" height="90" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="160" y="308" text-anchor="middle" fill="#15803d" font-size="12" font-weight="600">🖥️ Visual Track</text>
  <text x="160" y="326" text-anchor="middle" fill="#374151" font-size="11">Flash Text Translation</text>
  <text x="160" y="342" text-anchor="middle" fill="#64748b" font-size="10">English → Chinese</text>
  <text x="160" y="358" text-anchor="middle" fill="#64748b" font-size="10">Oversized, append-only UI</text>
  <rect x="80" y="364" width="160" height="18" rx="3" fill="#dcfce7"/>
  <text x="160" y="377" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="500">bypasses agent — faithful, no hallucination</text>

  <line x1="160" y1="375" x2="160" y2="640" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>

  <!-- ===== CHANNEL 2: ADK AGENT CHAIN (center) ===== -->
  <rect x="310" y="285" width="380" height="370" rx="12" fill="#f8fafc" stroke="#2563eb" stroke-width="2"/>
  <text x="500" y="310" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">ADK Multi-Agent Chain</text>

  <!-- Orchestrator -->
  <rect x="360" y="325" width="280" height="36" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="500" y="347" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="600">Orchestrator (root agent)</text>

  <!-- Arrow down to Guardian -->
  <line x1="500" y1="361" x2="500" y2="395" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Guardian box -->
  <rect x="360" y="400" width="280" height="44" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="500" y="420" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="700">🛡️ Guardian (runs FIRST)</text>
  <text x="500" y="436" text-anchor="middle" fill="#64748b" font-size="10">Injection detection · PII interception · Privacy check</text>

  <!-- Short-circuit branch (red, to the left) -->
  <line x1="360" y1="422" x2="280" y2="480" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <rect x="120" y="478" width="180" height="32" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="210" y="498" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="600">🚫 BLOCK — Privacy card only</text>
  <text x="210" y="504" text-anchor="middle" fill="#64748b" font-size="9">(skip Router + Companion)</text>

  <line x1="210" y1="510" x2="210" y2="640" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>

  <!-- Main line continues down to Router -->
  <line x1="500" y1="444" x2="500" y2="475" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Router box -->
  <rect x="360" y="480" width="280" height="40" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="500" y="498" text-anchor="middle" fill="#475569" font-size="12" font-weight="600">🚦 Router</text>
  <text x="500" y="514" text-anchor="middle" fill="#64748b" font-size="10">Deterministic classify (keyword + overrides)</text>

  <!-- Arrow down to Companion -->
  <line x1="500" y1="520" x2="500" y2="552" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Companion box -->
  <rect x="360" y="555" width="280" height="44" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="500" y="573" text-anchor="middle" fill="#0369a1" font-size="13" font-weight="600">🧠 Companion (LlmAgent)</text>
  <text x="500" y="589" text-anchor="middle" fill="#64748b" font-size="10">Reasons · Calls MCP tools · Composes response cards</text>

  <!-- Companion → MCP tools (rightward) -->
  <line x1="640" y1="577" x2="780" y2="330" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Companion → Cards (downward) -->
  <line x1="500" y1="599" x2="500" y2="640" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- ===== CHANNEL 3: MCP TOOLS (right) ===== -->
  <rect x="770" y="285" width="200" height="120" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="870" y="310" text-anchor="middle" fill="#b45309" font-size="12" font-weight="600">🔌 MCP Server</text>
  <text x="870" y="330" text-anchor="middle" fill="#374151" font-size="11">memory_search</text>
  <text x="870" y="348" text-anchor="middle" fill="#374151" font-size="11">memory_write</text>
  <text x="870" y="366" text-anchor="middle" fill="#374151" font-size="11">check_drug_interaction</text>
  <rect x="850" y="372" width="95" height="16" rx="3" fill="#fef3c7"/>
  <text x="897" y="384" text-anchor="middle" fill="#b45309" font-size="9" font-weight="500">(deterministic)</text>
  <text x="870" y="400" text-anchor="middle" fill="#374151" font-size="11">notify_family</text>

  <!-- MCP → SQLite -->
  <line x1="870" y1="405" x2="870" y2="450" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="810" y="455" width="120" height="35" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="870" y="476" text-anchor="middle" fill="#475569" font-size="11" font-weight="500">🗄️ SQLite</text>

  <!-- ===== BOTTOM: FRONTEND UI ===== -->
  <rect x="80" y="645" width="840" height="55" rx="12" fill="#f8fafc" stroke="#1e293b" stroke-width="2"/>
  <text x="500" y="665" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="600">Frontend UI</text>

  <rect x="100" y="675" width="160" height="18" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="180" y="688" text-anchor="middle" fill="#15803d" font-size="9">中文大字 (faithful)</text>

  <rect x="275" y="675" width="200" height="18" rx="4" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <text x="375" y="688" text-anchor="middle" fill="#475569" font-size="9">Response Cards</text>

  <rect x="490" y="675" width="150" height="18" rx="4" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <text x="565" y="688" text-anchor="middle" fill="#475569" font-size="9">Block / Privacy Alerts</text>

  <rect x="655" y="675" width="120" height="18" rx="4" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <text x="715" y="688" text-anchor="middle" fill="#475569" font-size="9">Confirmation</text>

  <rect x="790" y="675" width="115" height="18" rx="4" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <text x="847" y="688" text-anchor="middle" fill="#475569" font-size="9">Family Notify</text>

  <!-- Audio output -->
  <rect x="80" y="715" width="840" height="35" rx="8" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="500" y="737" text-anchor="middle" fill="#0369a1" font-size="11" font-weight="500">🔊 KK TTS Audio Output (mic muted while playing — half-duplex)</text>

  <!-- ===== LEGEND ===== -->
  <rect x="80" y="765" width="840" height="22" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="100" y="771" width="10" height="10" rx="2" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="115" y="779" fill="#64748b" font-size="10">Visual Track</text>

  <rect x="200" y="771" width="10" height="10" rx="2" fill="#f8fafc" stroke="#2563eb" stroke-width="1"/>
  <text x="215" y="779" fill="#64748b" font-size="10">ADK Agent Layer</text>

  <rect x="325" y="771" width="10" height="10" rx="2" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="340" y="779" fill="#64748b" font-size="10">MCP Tools</text>

  <rect x="420" y="771" width="10" height="10" rx="2" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="435" y="779" fill="#64748b" font-size="10">Guardian (fail-closed, runs 1st)</text>

  <rect x="600" y="771" width="10" height="10" rx="2" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="615" y="779" fill="#64748b" font-size="10">SQLite</text>

  <text x="700" y="779" fill="#64748b" font-size="10">Order: Guardian → Router → Companion</text>
</svg>
