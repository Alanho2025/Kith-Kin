services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kithkin}
      POSTGRES_USER: ${POSTGRES_USER:-kk_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_demo_only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - kithkin_postgres_data:/var/lib/postgresql/data

  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_TEST_DB:-kithkin_test}
      POSTGRES_USER: ${POSTGRES_USER:-kk_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_demo_only}
    ports:
      - "${POSTGRES_TEST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kithkin_postgres_data:
